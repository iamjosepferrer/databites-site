<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1200px; height: 630px; overflow: hidden; background: #1A3829; }
body { position: relative; padding: 56px 72px; display: flex; flex-direction: column; justify-content: space-between; }

.photo {
  position: absolute;
  top: 90px; right: 72px;
  width: 240px; height: 370px;
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid rgba(168,221,196,0.2);
}
.photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }

.top { display: flex; flex-direction: column; gap: 0; max-width: 820px; }
.mid { display: flex; flex-direction: column; max-width: 720px; }
.bottom { display: flex; align-items: flex-end; justify-content: space-between; max-width: 820px; }

/* Header row: logo + name/role */
.header-row { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
.logo img { height: 52px; width: auto; display: block; flex-shrink: 0; }
.header-divider { width: 1px; height: 44px; background: rgba(168,221,196,0.2); flex-shrink: 0; }
.header-text { display: flex; flex-direction: column; gap: 4px; }
.name {
  font-family: 'Lilita One', cursive;
  font-size: 30px; color: #FAF6F0; opacity: 0.7;
  letter-spacing: -0.1px; line-height: 1;
}
.role {
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: #38B86E; letter-spacing: 3px; opacity: 0.8;
}

.h1 {
  font-family: 'Lilita One', cursive;
  font-size: 68px; line-height: 1.05; color: #FAF6F0;
  letter-spacing: -0.3px; margin-bottom: 20px;
}
.sub {
  font-family: 'Lilita One', cursive;
  font-size: 38px; line-height: 1.1; color: #38B86E;
  letter-spacing: -0.3px;
}

.stats { display: flex; gap: 56px; }
.stat-num { font-family: 'Lilita One', cursive; font-size: 28px; color: #38B86E; line-height: 1; }
.stat-label { font-family: 'Space Mono', monospace; font-size: 9px; color: #A8DDC4; letter-spacing: 1.5px; opacity: 0.5; margin-top: 4px; }
.url {
  position: absolute;
  bottom: 56px; right: 72px;
  font-family: 'Space Mono', monospace;
  font-size: 12px; color: #A8DDC4; letter-spacing: 1px; opacity: 0.4;
  width: 240px; text-align: right;
}
</style>
</head>
<body>

  <div class="photo">
    <img src="images/headshot.png" alt="Josep Ferrer">
  </div>

  <div class="top">
    <div class="header-row">
      <div class="logo">
        <img src="images/databitestech_logo_letters.png" alt="databites.tech">
      </div>
      <div class="header-divider"></div>
      <div class="header-text">
        <div class="name">Josep Ferrer</div>
        <div class="role">TECHNICAL WRITING</div>
      </div>
    </div>
  </div>

  <div class="mid">
    <div class="h1">Technical writing for<br>data &amp; AI companies</div>
    <div class="sub">by someone who actually understands the product.</div>
  </div>

  <div class="bottom">
    <div class="stats">
      <div class="stat">
        <div class="stat-num">1M+</div>
        <div class="stat-label">IMPRESSIONS</div>
      </div>
      <div class="stat">
        <div class="stat-num">10k</div>
        <div class="stat-label">SUBSCRIBERS</div>
      </div>
      <div class="stat">
        <div class="stat-num">30k</div>
        <div class="stat-label">X FOLLOWERS</div>
      </div>
    </div>
  </div>

  <div class="url">databites.tech/write</div>

</body>
</html>
